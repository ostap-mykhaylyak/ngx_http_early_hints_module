# =============================================================================
# Esempi di configurazione per ngx_http_early_hints_set_module
# nginx >= 1.29.1 (testato per 1.31.x), HTTP/1.1 + HTTP/2 + HTTP/3
# =============================================================================

# Caricare il modulo dinamico (a livello "main", fuori dal blocco http).
load_module modules/ngx_http_early_hints_set_module.so;

http {

    # -------------------------------------------------------------------------
    # Mappa di esempio: invia gli early hints SOLO su HTTP/2 e HTTP/3.
    # $http2 / $http3 sono non-vuoti quando la connessione usa quel protocollo.
    # -------------------------------------------------------------------------
    map "$http2$http3" $eh_h2h3 {
        default 1;   # almeno uno tra h2/h3 attivo -> abilita
        ""      0;   # nessuno dei due (es. HTTP/1.1) -> disabilita
    }

    # -------------------------------------------------------------------------
    # Mappa di esempio: invia gli early hints SOLO per le navigazioni di pagina
    # (il browser invia Sec-Fetch-Mode: navigate). Evita di sprecarli su
    # fetch/XHR/preflight.
    # -------------------------------------------------------------------------
    map $http_sec_fetch_mode $eh_navigate {
        navigate 1;
        default  0;
    }

    # =========================================================================
    # ESEMPIO 1 — Sempre attivo, contenuto statico
    # =========================================================================
    server {
        listen 443 ssl;
        listen 443 quic reuseport;
        http2 on;
        http3 on;

        server_name static.example.com;
        root /var/www/site;

        location / {
            early_hints      1;                                    # gate: ON
            early_hints_link "</css/style.css>; rel=preload; as=style";
            early_hints_link "</js/app.js>;     rel=preload; as=script";
            early_hints_link "</fonts/inter.woff2>; rel=preload; as=font; crossorigin";

            try_files $uri $uri/ /index.html;
        }
    }

    # =========================================================================
    # ESEMPIO 2 — Reverse proxy, early hints solo su h2/h3 e solo navigazioni
    # =========================================================================
    server {
        listen 443 ssl;
        listen 443 quic reuseport;
        http2 on;
        http3 on;

        server_name app.example.com;

        location / {
            # gate condizionato: abilita solo se h2/h3 E navigazione di pagina.
            # early_hints e' "vero" se ALMENO un argomento e' vero, quindi qui
            # usiamo una sola variabile combinata.
            set $eh "0";
            if ($eh_h2h3) { set $eh "$eh_navigate"; }
            early_hints $eh;

            early_hints_link "<$scheme://$host/assets/main.css>; rel=preload; as=style";
            early_hints_link "<$scheme://$host/assets/main.js>;  rel=preload; as=script";
            early_hints_link "<https://cdn.example.com>; rel=preconnect";

            proxy_pass http://backend;
        }
    }

    # =========================================================================
    # ESEMPIO 3 — Hint diversi per path diversi
    # =========================================================================
    server {
        listen 443 ssl;
        listen 443 quic reuseport;
        http2 on;
        http3 on;

        server_name shop.example.com;
        root /var/www/shop;

        # home: precarica hero + css critico
        location = / {
            early_hints      $eh_h2h3;
            early_hints_link "</css/home.css>; rel=preload; as=style";
            early_hints_link "</img/hero.avif>; rel=preload; as=image; fetchpriority=high";
            try_files /index.html =404;
        }

        # pagine prodotto: css di catalogo + preconnect al CDN immagini
        location /p/ {
            early_hints      $eh_h2h3;
            early_hints_link "</css/catalog.css>; rel=preload; as=style";
            early_hints_link "<https://img.shop.example.com>; rel=preconnect";
            try_files $uri /product.html;
        }
    }
}
